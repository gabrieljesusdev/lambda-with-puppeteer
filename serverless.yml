service: lambda-puppeteer-scraper

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  memorySize: 512
  timeout: 29

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    external:
      - puppeteer-core
      - rebrowser-patches
      - "@sparticuz/chromium"

plugins:
  - serverless-offline

custom:
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002

functions:
  scrape:
    handler: src/handlers/index.handler
    url: true